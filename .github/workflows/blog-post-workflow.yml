name: Latest blog post workflow

# 每 6 小时把 https://blog.june-pj.cn/atom.xml 的最新 5 篇文章
# 注入到 README.md 的 <!-- BLOG-POST-LIST --> 区块。
# 也可在 Actions 页面手动触发（workflow_dispatch）。

on:
  schedule:
    # cron 时区为 UTC，每 6 小时整点执行
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.june-pj.cn/atom.xml"
          max_post_count: 5
          # 每行格式：- `日期` · [标题](链接)
          template: "- `$date` · [$title]($url)"
          date_format: "yyyy-MM-dd"
          commit_message: "chore: update latest blog posts"
