name: Generate README Assets

# 国内访问 *.vercel.app 经常 connection refused（GitHub camo 缓存也时灵时不灵），
# 让 GitHub Action runner（位于 GitHub 美国机房）每天预先把所有 SVG 资源
# 下载/生成到 output 分支，README 通过 raw.githubusercontent.com 引用，国内访问稳定。
#
# 生成的资源：
#   - github-snake.svg / github-snake-dark.svg     贪吃蛇吃格子动画
#   - stats.svg / stats-dark.svg                   GitHub 综合数据卡
#   - top-langs.svg / top-langs-dark.svg           语言占比卡

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/generate-assets.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare output dir
        run: mkdir -p dist

      # ---------- 贪吃蛇 ----------
      - name: Generate snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: June-PJ
          # 颜色按官方文档字面量用 #：浅色珊瑚红 #E68282，深色琥珀黄 #F2B94B
          outputs: |
            dist/github-snake.svg?color_snake=#E68282&color_dots=#E5E7EB,#F8C5C5,#EFA5A5,#E68282,#D86060
            dist/github-snake-dark.svg?color_snake=#F2B94B&color_dots=#2E2E36,#5E4F2A,#8A7330,#B89640,#F2B94B

      # ---------- GitHub 综合数据卡 ----------
      - name: Download stats card (light)
        run: |
          curl -fSL --retry 5 --retry-delay 5 -o dist/stats.svg \
            "https://github-readme-stats.vercel.app/api?username=June-PJ&show_icons=true&hide_border=true&hide_title=true&include_all_commits=true&count_private=true&card_width=420&disable_animations=true&bg_color=00000000&icon_color=E68282&text_color=475569&title_color=E68282"

      - name: Download stats card (dark)
        run: |
          curl -fSL --retry 5 --retry-delay 5 -o dist/stats-dark.svg \
            "https://github-readme-stats.vercel.app/api?username=June-PJ&show_icons=true&hide_border=true&hide_title=true&include_all_commits=true&count_private=true&card_width=420&disable_animations=true&bg_color=00000000&icon_color=F2B94B&text_color=C4C4D0&title_color=F2B94B"

      # ---------- 语言占比卡 ----------
      - name: Download top languages card (light)
        run: |
          curl -fSL --retry 5 --retry-delay 5 -o dist/top-langs.svg \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=June-PJ&layout=compact&hide_border=true&hide_title=true&langs_count=6&card_width=320&bg_color=00000000&text_color=475569&title_color=E68282"

      - name: Download top languages card (dark)
        run: |
          curl -fSL --retry 5 --retry-delay 5 -o dist/top-langs-dark.svg \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=June-PJ&layout=compact&hide_border=true&hide_title=true&langs_count=6&card_width=320&bg_color=00000000&text_color=C4C4D0&title_color=F2B94B"

      # ---------- 推送 output 分支 ----------
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
