name: Generate README Assets

# 暂时不在 README 展示（仓库 commits / repos 还少，撑不起场面），
# 因此关掉 cron 自动跑，只保留手动触发。需要时去 Actions 页 Run workflow，
# 然后把 README 里 "### 数据" / "### 足迹" 两段从 HTML 注释里拆出来。
#
# 资源由两条管线生成：
#   1. Python 调 GitHub GraphQL 拼 stats / top-langs SVG（不依赖 vercel）
#   2. Platane/snk 生成贪吃蛇（用官方 palette 预设）
# 推到 output 分支，README 通过 raw.githubusercontent.com 引用，国内访问稳定。

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ---------- stats / top-langs（自己调 GraphQL 生成） ----------
      - name: Generate stats SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: June-PJ
        run: python .github/scripts/generate_stats.py

      # ---------- 贪吃蛇 ----------
      # 用官方 palette 预设：github（浅色，绿色调）/ github-dark（深色，绿色调）
      # 之前尝试 color_snake / color_dots 自定义颜色都失败（v3 svg-only 解析 query
      # string 但 GitHub Actions 实际加载的版本可能不是 main 分支编译产物）
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: June-PJ
          outputs: |
            dist/github-snake.svg?palette=github-light
            dist/github-snake-dark.svg?palette=github-dark

      - name: List generated files
        run: ls -la dist/

      # ---------- 推送到 output 分支 ----------
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
