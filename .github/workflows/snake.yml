name: Generate Snake

# 把 June-PJ 的贡献热力图生成"贪吃蛇吃格子"动画 SVG，
# 推到 output 分支供 README 引用。每天 0 点（UTC）跑一次，也支持手动触发。

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/snake.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: June-PJ
          # 输出多个文件：浅色版 + 深色版（GitHub 按访客主题切换）
          # 配色对齐 junePortal：浅色 #E68282 珊瑚红，深色 #F2B94B 琥珀黄
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=E68282&color_dots=E5E7EB,F8C5C5,EFA5A5,E68282,D86060
            dist/github-snake-dark.svg?palette=github-dark&color_snake=F2B94B&color_dots=2E2E36,5E4F2A,8A7330,B89640,F2B94B

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
